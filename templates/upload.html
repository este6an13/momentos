{% extends "base.html" %}

{% block title %}Upload - Momentos{% endblock %}

{% block content %}
<div class="upload-container">
    <div class="upload-header">
        <h1 class="upload-title">Upload Photo</h1>
    </div>

    <div class="upload-grid">
        <div class="upload-dropzone" id="dropzone">
            <div class="upload-icon">⇪</div>
            <div class="upload-text">Drag and drop a photo here</div>
            <div class="upload-hint">or click to browse</div>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <div class="upload-preview" id="previewArea">
                <img id="imagePreview" src="" alt="Preview">
            </div>
        </div>

        <form class="upload-form" id="uploadForm">
            <div class="form-group">
                <label class="form-label" for="title">Title</label>
                <input class="form-input" type="text" id="title" name="title" placeholder="Leave blank to use filename">
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea class="form-textarea" id="description" name="description"
                    placeholder="A brief description of this moment..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label" for="location">Location</label>
                <input class="form-input" type="text" id="location" name="location" placeholder="e.g. Kyoto, Japan">
            </div>

            <div class="form-group">
                <label class="form-label" for="taken_at">Date Taken</label>
                <!-- Remove the step so that seconds aren't strictly required by the browser padding -->
                <input class="form-input" type="datetime-local" id="taken_at" name="taken_at">
            </div>

            <div class="form-group">
                <label class="form-label">Tags (press space or enter to add)</label>
                <div class="tag-input-container" id="tag-container">
                    <input type="text" id="tag-input-field" placeholder="nature, travel, film">
                </div>
                <!-- Hidden input to store comma-separated tags for form submission -->
                <input type="hidden" id="tags" name="tags">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn" disabled>Upload Photo</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const imagePreview = document.getElementById('imagePreview');
    const submitBtn = document.getElementById('submitBtn');
    const takenAtInput = document.getElementById('taken_at');
    const tagContainer = document.getElementById('tag-container');
    const tagInputField = document.getElementById('tag-input-field');
    const hiddenTagsInput = document.getElementById('tags');

    let selectedFile = null;
    let tags = [];

    function updateTags() {
        // Remove existing chips
        const existingChips = tagContainer.querySelectorAll('.tag-chip');
        existingChips.forEach(chip => chip.remove());

        // Add new chips
        tags.forEach((tag, index) => {
            const chip = document.createElement('div');
            chip.className = 'tag-chip';
            chip.innerHTML = `
                <span>${tag}</span>
                <span class="tag-chip-remove" onclick="removeTag(${index})">&times;</span>
            `;
            tagContainer.insertBefore(chip, tagInputField);
        });

        // Update hidden input
        hiddenTagsInput.value = tags.join(', ');
    }

    window.removeTag = function (index) {
        tags.splice(index, 1);
        updateTags();
    };

    tagInputField.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            const val = tagInputField.value.trim().replace(/,/g, '');
            if (val && !tags.includes(val)) {
                tags.push(val);
                tagInputField.value = '';
                updateTags();
            }
        } else if (e.key === 'Backspace' && tagInputField.value === '' && tags.length > 0) {
            tags.pop();
            updateTags();
        }
    });

    // Handle clicks on container to focus input
    tagContainer.addEventListener('click', () => {
        tagInputField.focus();
    });

    // Trigger file input when clicking dropzone
    dropzone.addEventListener('click', () => {
        // Prevent click if we are clicking on the image preview
        fileInput.click();
    });

    // Handle drag and drop events
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'), false);
    });

    dropzone.addEventListener('drop', handleDrop, false);
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files), false);

    function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        handleFiles(files);
    }

    function handleFiles(files) {
        if (files.length > 0) {
            const file = files[0];
            if (file.type.startsWith('image/')) {
                selectedFile = file;
                previewFile(file);
                submitBtn.disabled = false;

                // Extract EXIF data
                EXIF.getData(file, function () {
                    const dateTimeOriginal = EXIF.getTag(this, "DateTimeOriginal");
                    if (dateTimeOriginal) {
                        try {
                            // Format: "YYYY:MM:DD HH:MM:SS" -> "YYYY-MM-DDTHH:MM"
                            const parts = dateTimeOriginal.split(' ');
                            const dateParts = parts[0].split(':');
                            const timeParts = parts[1].split(':');
                            const formatted = `${dateParts[0]}-${dateParts[1]}-${dateParts[2]}T${timeParts[0]}:${timeParts[1]}`;
                            takenAtInput.value = formatted;
                        } catch (e) {
                            console.log("Could not parse EXIF date", e);
                        }
                    } else {
                        // Clear the input if no EXIF date found so the user can manually set it
                        takenAtInput.value = "";
                    }
                });
            } else {
                alert('Please upload an image file.');
            }
        }
    }

    function previewFile(file) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = function () {
            imagePreview.src = reader.result;
            previewArea.classList.add('active');
        }
    }

    // Handle form submission
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!selectedFile) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Uploading...';

        const formData = new FormData(uploadForm);
        formData.append('file', selectedFile);

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                alert('Upload successful!');
                // Reset form
                uploadForm.reset();
                selectedFile = null;
                previewArea.classList.remove('active');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Upload Photo';
                tags = [];
                updateTags();
            } else {
                alert('Upload failed. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload Photo';
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred during upload.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Upload Photo';
        }
    });
</script>
{% endblock %}
