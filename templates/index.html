{% extends "base.html" %}

{% block content %}
<div class="gallery-wrapper">
    <div class="gallery-hero">
        <p class="gallery-tagline">moments, collected.</p>
    </div>

    <div id="photo-grid"
        hx-get="/photos{% if initial_tag %}?tag={{ initial_tag }}{% elif initial_q %}?q={{ initial_q }}{% endif %}"
        hx-trigger="load">
        <!-- Initial loading state -->
        <div class="loading-state">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>
</div>

<script>
    (function () {
        const initialTag = "{{ initial_tag or '' }}";
        const initialQ = "{{ initial_q or '' }}";
        const initialPhotoId = "{{ initial_photo_id or '' }}";

        const triggerInitialLoad = () => {
            if (typeof htmx !== 'undefined' && typeof setTagFilter === 'function') {
                if (initialTag) {
                    // Update UI only, as photo-grid already requested filtered content
                    setTagFilter(initialTag, false, false);
                } else if (initialQ) {
                    // Populate search input only
                    const searchInput = document.querySelector('.search-input');
                    if (searchInput) searchInput.value = initialQ;
                }

                if (initialPhotoId) {
                    // Trigger opening the photo modal
                    htmx.ajax('GET', '/photo/' + initialPhotoId, { target: '#modal-content', swap: 'innerHTML' });
                }
            } else {
                setTimeout(triggerInitialLoad, 50);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', triggerInitialLoad);
        } else {
            triggerInitialLoad();
        }
    })();
</script>
{% endblock %}
