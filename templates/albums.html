{% extends "base.html" %}

{% block title %}Albums — Momentos{% endblock %}

{% block header_controls %}
<span class="nav-count" id="album-count"></span>
{% endblock %}

{% block content %}
<div class="gallery-wrapper">
    <div class="gallery-hero">
        <p class="gallery-tagline">albums.</p>
    </div>

    <div id="album-grid">
        <div class="loading-state">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>
</div>

<script>
    window.__PHOTOS = {{ photos_json | safe }};
    window.IMAGE_BASE_URL = "{{ image_base_url }}";
</script>
<script src="/static/js/albums.js?v=1"></script>
<script>
    (function () {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function () { Albums.init(window.__PHOTOS); });
        } else {
            Albums.init(window.__PHOTOS);
        }
    })();
</script>
{% endblock %}
