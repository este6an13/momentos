<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personal photo gallery - moments captured in time.">
    <title>{% block title %}Momentos{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/icons/favicon.png?v=2">
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="site-logo">&#9632; gallery</a>
            <nav class="site-nav" style="display: flex; align-items: center; gap: 1rem;">
                {% block header_controls %}
                <div id="search-form" class="search-form">

                    <div class="search-container">
                        <button type="button" id="search-toggle" class="nav-btn-circle nav-icon-btn mobile-only"
                            title="Search Photos" onclick="toggleMobileSearch()">
                            <span class="material-symbols-outlined">search</span>
                        </button>
                        <input type="search" class="search-input" placeholder="Search photos..."
                            onkeydown="if(event.key==='Enter') event.preventDefault();"
                            oninput="handleSearchInput(this.value)">

                        <input type="hidden" id="tag-input" value="">
                    </div>

                    <label class="nav-btn-circle" title="Toggle Timeline Sort">
                        <input type="checkbox" class="sort-input" style="display: none;"
                            onchange="handleSortToggle(this.checked)">
                        <span id="sort-icon"
                            style="font-size: 1.1rem; line-height: 1; color: var(--text-secondary);">↓</span>
                    </label>

                    <button type="button" id="shuffle-btn" class="nav-btn-circle nav-icon-btn" title="Shuffle Photos"
                        onclick="toggleShuffle()">
                        <span class="material-symbols-outlined">shuffle</span>
                    </button>
                </div>
                <span class="nav-count" id="photo-count"></span>
                {% endblock %}
                <a href="/about"
                    style="font-size: 0.75rem; font-weight: 300; letter-spacing: 0.08em; text-transform: lowercase; color: var(--text-muted); transition: color var(--transition); text-decoration: none;"
                    onmouseover="this.style.color='var(--text-primary)'"
                    onmouseout="this.style.color='var(--text-muted)'">about</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Lightbox modal -->
    <div id="photo-modal" class="modal" role="dialog" aria-modal="true" aria-label="Photo detail">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-copyright">
                &copy; <span id="current-year"></span> Diego Esteban
                <span style="margin: 0 0.5rem; opacity: 0.5;">|</span>
                <a href="/about" style="color: inherit; text-decoration: none; transition: color var(--transition);"
                    onmouseover="this.style.color='var(--text-primary)'"
                    onmouseout="this.style.color='inherit'">about</a>
            </div>
            <div class="footer-tagline">moments, collected.</div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        /* ── Search Mobile Toggle ── */
        function toggleMobileSearch() {
            const form = document.getElementById('search-form');
            const input = form.querySelector('.search-input');
            const isShowing = form.classList.toggle('show-search');

            if (isShowing) {
                input.focus();
            }
        }

        /* ── Random Tagline ── */
        const taglines = ["moments, collected.", "momentos, guardados."];
        const chosenTagline = taglines[Math.floor(Math.random() * taglines.length)];
        document.querySelectorAll('.footer-tagline, .gallery-tagline').forEach(el => {
            el.textContent = chosenTagline;
        });

        /* ── Search Handler (debounced) ── */
        let searchTimer = null;
        function handleSearchInput(value) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                if (typeof Gallery !== 'undefined') {
                    Gallery.search(value);
                }
            }, 300);
        }

        /* ── Sort Toggle Handler ── */
        function handleSortToggle(checked) {
            const sortIcon = document.getElementById('sort-icon');
            sortIcon.innerText = checked ? '↑' : '↓';
            deactivateShuffleUI();
            const mode = checked ? 'asc' : 'desc';
            if (typeof Gallery !== 'undefined') {
                Gallery.sort(mode);
            }
        }

        /* ── Shuffle ── */
        let shuffleActive = false;
        function toggleShuffle() {
            const btn = document.getElementById('shuffle-btn');
            if (shuffleActive) {
                deactivateShuffleUI();
                const chk = document.querySelector('.sort-input');
                const mode = chk && chk.checked ? 'asc' : 'desc';
                if (typeof Gallery !== 'undefined') Gallery.sort(mode);
            } else {
                shuffleActive = true;
                btn.classList.add('active');
                btn.title = 'Disable Shuffle';
                if (typeof Gallery !== 'undefined') Gallery.sort('shuffle');
            }
        }

        function deactivateShuffleUI() {
            const btn = document.getElementById('shuffle-btn');
            if (btn) {
                btn.classList.remove('active');
                btn.title = 'Shuffle Photos';
            }
            shuffleActive = false;
        }

        /* ── Modal ── */
        function closeModal() {
            const modal = document.getElementById('photo-modal');
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');

            // Remove ?p= from URL
            const url = new URL(window.location);
            if (url.searchParams.has('p')) {
                url.searchParams.delete('p');
                window.history.pushState({}, '', url);
            }
        }

        /* ── Legacy global aliases (for tag clicks from photo_detail.html HTMX admin flows) ── */
        function setTagFilter(tagName) {
            if (typeof Gallery !== 'undefined') {
                Gallery.setTag(tagName);
            } else {
                window.location.href = '/?tag=' + encodeURIComponent(tagName);
            }
        }
        function clearTagFilter() {
            if (typeof Gallery !== 'undefined') {
                Gallery.clearTag();
            }
        }

        /* ── Popstate (browser back/forward) ── */
        window.onpopstate = function (event) {
            const url = new URL(window.location);
            const slug = url.searchParams.get('p');
            const tag = url.searchParams.get('tag');
            const q = url.searchParams.get('q');

            if (slug) {
                const modal = document.getElementById('photo-modal');
                const lb = document.getElementById('lightbox-inner');
                if (!modal.classList.contains('active') || (lb && lb.dataset.filename !== slug)) {
                    if (typeof Gallery !== 'undefined') {
                        Gallery.openLightboxByFilename(slug);
                    }
                }
            } else {
                const modal = document.getElementById('photo-modal');
                modal.classList.remove('active');
                document.body.classList.remove('modal-open');
                clearControlTimer();
            }

            if (typeof Gallery !== 'undefined') {
                if (tag) {
                    Gallery.setTag(tag);
                } else {
                    Gallery.clearTag();
                }
            }

            const searchInput = document.querySelector('.search-input');
            if (searchInput && searchInput.value !== (q || '')) {
                searchInput.value = q || '';
                if (typeof Gallery !== 'undefined') {
                    Gallery.search(q || '');
                }
            }
        };

        /* ── Auto-hide lightbox controls ── */
        let controlTimer = null;

        function resetControlTimer() {
            const controls = document.querySelector('.lightbox-controls');
            if (controls) {
                controls.classList.remove('controls-hidden');
            }
            clearTimeout(controlTimer);
            controlTimer = setTimeout(() => {
                const c = document.querySelector('.lightbox-controls');
                if (c) c.classList.add('controls-hidden');
            }, 3000);
        }

        function clearControlTimer() {
            clearTimeout(controlTimer);
            controlTimer = null;
        }

        // Toggle controls on tap/click on the lightbox image area
        document.getElementById('photo-modal').addEventListener('click', function (e) {
            if (e.target.closest('.lightbox-arrow, .lightbox-close, .admin-actions')) return;

            const controls = document.querySelector('.lightbox-controls');
            if (!controls) return;

            if (e.target.closest('.lightbox-meta')) {
                controls.classList.remove('controls-hidden');
                resetControlTimer();
                return;
            }

            if (controls.classList.contains('controls-hidden')) {
                controls.classList.remove('controls-hidden');
                resetControlTimer();
            } else {
                controls.classList.add('controls-hidden');
                clearTimeout(controlTimer);
            }
        });

        // Show controls on mouse movement
        document.getElementById('photo-modal').addEventListener('pointermove', function (e) {
            if (e.pointerType !== 'mouse') return;
            const modal = document.getElementById('photo-modal');
            if (modal.classList.contains('active')) {
                resetControlTimer();
            }
        });

        /* ── Swipe support (now uses Gallery.navigateLightbox) ── */
        let touchstartX = 0;
        let touchstartY = 0;
        let touchendX = 0;
        let touchendY = 0;

        function handleGesture() {
            const modal = document.getElementById('photo-modal');
            if (!modal.classList.contains('active')) return;

            const lb = document.getElementById('lightbox-inner');
            if (!lb) return;

            const deltaX = touchendX - touchstartX;
            const deltaY = touchendY - touchstartY;
            const threshold = 60;
            const ratio = 2.0;

            if (Math.abs(deltaY) * ratio > Math.abs(deltaX)) return;

            if (deltaX < -threshold) {
                Gallery.navigateLightbox('next');
            } else if (deltaX > threshold) {
                Gallery.navigateLightbox('prev');
            }
        }

        document.getElementById('photo-modal').addEventListener('touchstart', e => {
            if (e.touches.length > 1) {
                touchstartX = 0;
                touchstartY = 0;
                return;
            }
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.getElementById('photo-modal').addEventListener('touchend', e => {
            if (e.touches.length > 0) return;
            touchendX = e.changedTouches[0].screenX;
            touchendY = e.changedTouches[0].screenY;
            if (touchstartX === 0) return;
            handleGesture();
        }, { passive: true });

        /* ── Keyboard navigation (now uses Gallery.navigateLightbox) ── */
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeModal();
                return;
            }

            const modal = document.getElementById('photo-modal');
            if (!modal.classList.contains('active')) return;

            if (e.key === 'ArrowLeft') {
                Gallery.navigateLightbox('prev');
            } else if (e.key === 'ArrowRight') {
                Gallery.navigateLightbox('next');
            }
        });

        /* ── Admin HTMX events (kept for edit/delete flows) ── */
        document.body.addEventListener('photoDeleted', function (e) {
            closeModal();
            // Reload the page to get fresh data after deletion
            window.location.reload();
        });

        // After HTMX swaps modal content (admin edit flow): reset auto-hide timer
        document.addEventListener('htmx:afterSwap', function (e) {
            if (e.target.id === 'modal-content') {
                resetControlTimer();
                const modal = document.getElementById('photo-modal');
                if (!modal.classList.contains('active')) {
                    modal.classList.add('active');
                    document.body.classList.add('modal-open');
                }
            }
        });
    </script>
</body>

</html>
