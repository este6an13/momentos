<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personal photo gallery - moments captured in time.">
    <title>{% block title %}Momentos{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/icons/favicon.png?v=2">
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="site-logo">&#9632; gallery</a>
            <nav class="site-nav" style="display: flex; align-items: center; gap: 1rem;">
                {% block header_controls %}
                <form id="search-form" hx-get="/photos" hx-target="#photo-grid"
                    hx-trigger="input from:.search-input delay:400ms, change from:.sort-input, search"
                    class="search-form">

                    <div class="search-container">
                        <button type="button" id="search-toggle" class="nav-btn-circle nav-icon-btn mobile-only"
                            title="Search Photos" onclick="toggleMobileSearch()">
                            <span class="material-symbols-outlined">search</span>
                        </button>
                        <input type="search" class="search-input" name="q" placeholder="Search photos...">
                    </div>

                    <label class="nav-btn-circle" title="Toggle Timeline Sort">
                        <input type="checkbox" class="sort-input" style="display: none;"
                            onchange="document.getElementById('sort-hidden').value = this.checked ? 'asc' : 'desc'; document.getElementById('sort-icon').innerText = this.checked ? '↑' : '↓'; deactivateShuffle()">
                        <input type="hidden" id="sort-hidden" name="sort" value="desc">
                        <span id="sort-icon"
                            style="font-size: 1.1rem; line-height: 1; color: var(--text-secondary);">↓</span>
                    </label>

                    <button type="button" id="shuffle-btn" class="nav-btn-circle nav-icon-btn" title="Shuffle Photos"
                        onclick="toggleShuffle()">
                        <span class="material-symbols-outlined">shuffle</span>
                    </button>
                </form>
                <span class="nav-count" id="photo-count"></span>
                {% endblock %}
                <a href="/about"
                    style="font-size: 0.75rem; font-weight: 300; letter-spacing: 0.08em; text-transform: lowercase; color: var(--text-muted); transition: color var(--transition); text-decoration: none;"
                    onmouseover="this.style.color='var(--text-primary)'"
                    onmouseout="this.style.color='var(--text-muted)'">about</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Lightbox modal -->
    <div id="photo-modal" class="modal" role="dialog" aria-modal="true" aria-label="Photo detail">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content" id="modal-content"></div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-copyright">
                &copy; <span id="current-year"></span> Diego Esteban
                <span style="margin: 0 0.5rem; opacity: 0.5;">|</span>
                <a href="/about" style="color: inherit; text-decoration: none; transition: color var(--transition);"
                    onmouseover="this.style.color='var(--text-primary)'"
                    onmouseout="this.style.color='inherit'">about</a>
            </div>
            <div class="footer-tagline">moments, collected.</div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        /* ── Search Mobile Toggle ── */
        function toggleMobileSearch() {
            const form = document.getElementById('search-form');
            const input = form.querySelector('.search-input');
            const isShowing = form.classList.toggle('show-search');

            if (isShowing) {
                input.focus();
            }
        }

        /* ── Random Tagline ── */
        const taglines = ["moments, collected.", "momentos, guardados."];
        const chosenTagline = taglines[Math.floor(Math.random() * taglines.length)];
        document.querySelectorAll('.footer-tagline, .gallery-tagline').forEach(el => {
            el.textContent = chosenTagline;
        });

        /* ── Shuffle ── */
        function toggleShuffle() {
            const btn = document.getElementById('shuffle-btn');
            const sortHidden = document.getElementById('sort-hidden');
            if (sortHidden.value === 'shuffle') {
                deactivateShuffle();
            } else {
                sortHidden.value = 'shuffle';
                btn.classList.add('active');
                btn.title = 'Disable Shuffle';
            }
            htmx.trigger('#search-form', 'search');
        }

        function deactivateShuffle() {
            const btn = document.getElementById('shuffle-btn');
            const sortHidden = document.getElementById('sort-hidden');
            const chk = document.querySelector('.sort-input');
            btn.classList.remove('active');
            btn.title = 'Shuffle Photos';
            if (sortHidden.value === 'shuffle') {
                sortHidden.value = chk && chk.checked ? 'asc' : 'desc';
            }
        }

        /* ── Modal ── */
        function closeModal() {
            const modal = document.getElementById('photo-modal');
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
            isZoomMode = false;
            clearControlTimer();
        }

        function openModal() {
            const modal = document.getElementById('photo-modal');
            modal.classList.add('active');
            document.body.classList.add('modal-open');
            resetControlTimer();
        }

        /* ── Auto-hide lightbox controls ── */
        let controlTimer = null;

        function resetControlTimer() {
            const controls = document.querySelector('.lightbox-controls');
            if (controls) {
                controls.classList.remove('controls-hidden');
            }
            clearTimeout(controlTimer);
            controlTimer = setTimeout(() => {
                const c = document.querySelector('.lightbox-controls');
                if (c) c.classList.add('controls-hidden');
            }, 3000);
        }

        function clearControlTimer() {
            clearTimeout(controlTimer);
            controlTimer = null;
        }

        // Toggle controls on tap/click on the lightbox image area
        document.getElementById('photo-modal').addEventListener('click', function (e) {
            // Ignore clicks on buttons or admin actions
            if (e.target.closest('.lightbox-arrow, .lightbox-close, .admin-actions')) return;

            const controls = document.querySelector('.lightbox-controls');
            if (!controls) return;

            // If clicking on the meta/details section, just show the controls (do not toggle off)
            if (e.target.closest('.lightbox-meta')) {
                controls.classList.remove('controls-hidden');
                resetControlTimer();
                return;
            }

            if (controls.classList.contains('controls-hidden')) {
                controls.classList.remove('controls-hidden');
                resetControlTimer();
            } else {
                controls.classList.add('controls-hidden');
                clearTimeout(controlTimer);
            }
        });

        // Show controls on mouse movement
        document.getElementById('photo-modal').addEventListener('pointermove', function (e) {
            if (e.pointerType !== 'mouse') return;
            const modal = document.getElementById('photo-modal');
            if (modal.classList.contains('active')) {
                resetControlTimer();
            }
        });



        /* ── Swipe support ── */
        let touchstartX = 0;
        let touchstartY = 0;
        let touchendX = 0;
        let touchendY = 0;
        let isZoomMode = false;

        function getCurrentSort() {
            const lb = document.getElementById('lightbox-inner');
            return lb ? (lb.dataset.sort || 'desc') : 'desc';
        }

        function toggleZoom() {
            const lb = document.getElementById('lightbox-inner');
            const btn = document.getElementById('zoom-toggle-btn');
            if (!lb || !btn) return;

            isZoomMode = !isZoomMode;
            lb.classList.toggle('lightbox--zoomed', isZoomMode);
            btn.classList.toggle('active', isZoomMode);

            const icon = btn.querySelector('.material-symbols-outlined');
            if (icon) {
                icon.innerText = isZoomMode ? 'zoom_out' : 'zoom_in';
            }

            if (isZoomMode) {
                btn.title = 'Disable Zoom';
            } else {
                btn.title = 'Enable Zoom';
            }
        }

        function handleGesture() {
            if (isZoomMode) return;

            const modal = document.getElementById('photo-modal');
            if (!modal.classList.contains('active')) return;

            const lb = document.getElementById('lightbox-inner');
            if (!lb) return;

            const deltaX = touchendX - touchstartX;
            const deltaY = touchendY - touchstartY;
            const threshold = 60;
            const ratio = 2.0;

            // Ignore if vertical movement is significant (scrolling details)
            if (Math.abs(deltaY) * ratio > Math.abs(deltaX)) return;

            const sort = getCurrentSort();
            if (deltaX < -threshold) {
                // Swiped left → Next
                const nextId = lb.dataset.nextId;
                if (nextId) {
                    htmx.ajax('GET', '/photo/' + nextId + '?sort=' + sort, { target: '#modal-content', swap: 'innerHTML' });
                }
            } else if (deltaX > threshold) {
                // Swiped right → Previous
                const prevId = lb.dataset.prevId;
                if (prevId) {
                    htmx.ajax('GET', '/photo/' + prevId + '?sort=' + sort, { target: '#modal-content', swap: 'innerHTML' });
                }
            }
        }

        document.getElementById('photo-modal').addEventListener('touchstart', e => {
            // Ignore multi-touch (pinching/zooming)
            if (e.touches.length > 1) {
                touchstartX = 0;
                touchstartY = 0;
                return;
            }
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.getElementById('photo-modal').addEventListener('touchend', e => {
            if (e.touches.length > 0) return; // Still some fingers down
            touchendX = e.changedTouches[0].screenX;
            touchendY = e.changedTouches[0].screenY;
            if (touchstartX === 0) return; // Was multi-touch
            handleGesture();
        }, { passive: true });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeModal();
                return;
            }

            const modal = document.getElementById('photo-modal');
            if (!modal.classList.contains('active')) return;

            const lb = document.getElementById('lightbox-inner');
            if (!lb) return;

            const sort = getCurrentSort();

            if (e.key === 'ArrowLeft') {
                const prevId = lb.dataset.prevId;
                if (prevId) {
                    htmx.ajax('GET', '/photo/' + prevId + '?sort=' + sort, { target: '#modal-content', swap: 'innerHTML' });
                }
            } else if (e.key === 'ArrowRight') {
                const nextId = lb.dataset.nextId;
                if (nextId) {
                    htmx.ajax('GET', '/photo/' + nextId + '?sort=' + sort, { target: '#modal-content', swap: 'innerHTML' });
                }
            }
        });

        document.body.addEventListener('photoDeleted', function (e) {
            closeModal();
            htmx.trigger('#search-form', 'search');
        });

        // After HTMX swaps modal content: apply slide animation + reset auto-hide timer
        document.addEventListener('htmx:afterSwap', function (e) {
            // Photo count update
            const cards = document.querySelectorAll('.photo-card');
            const countEl = document.getElementById('photo-count');
            if (countEl && cards.length > 0) {
                countEl.textContent = cards.length + ' photo' + (cards.length !== 1 ? 's' : '');
            }

            // Reset auto-hide timer when new photo loads
            if (e.target.id === 'modal-content') {
                resetControlTimer();
                // Ensure Zoom Mode state is reflected in UI if it was active
                const lb = document.getElementById('lightbox-inner');
                if (lb && isZoomMode) {
                    lb.classList.add('lightbox--zoomed');
                }
            }
        });
    </script>
</body>

</html>
